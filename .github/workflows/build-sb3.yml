name: SB3 编译为 EXE + HTML + APK
on:
  workflow_dispatch:
    inputs:
      sb3_file:
        description: '仓库中的 .sb3 文件名（例如：game.sb3）'
        required: true
        type: string
      output_name:
        description: '输出文件名称（无后缀，例如：mygame）'
        required: true
        type: string
      apk_package_name:
        description: 'APK 包名（例如：com.user.mygame）'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 TurboWarp 打包工具
        run: npm install -g turbowarp-packager-cli

      # ==================== 编译 HTML（完整配置，解决报错） ====================
      - name: 编译 HTML 文件
        run: |
          cat > config.json << 'EOF'
          {
            "compiler": {
              "minify": true,
              "noRuntime": false,
              "experimentalOptimizations": false
            },
            "addons": {
              "specialCloudBehaviors": false,
              "gamepad": false,
              "profiler": false
            },
            "output": {
              "format": "html",
              "platform": "web"
            },
            "scaling": {
              "mode": "full",
              "size": 480
            }
          }
          EOF
          turbowarp-packager-cli -i "${{ inputs.sb3_file }}" -o "${{ inputs.output_name }}.html" -s config.json

      # ==================== 编译 EXE（修改配置即可） ====================
      - name: 编译 EXE 文件
        run: |
          cat > config-exe.json << 'EOF'
          {
            "compiler": {
              "minify": true,
              "noRuntime": false,
              "experimentalOptimizations": false
            },
            "addons": {
              "specialCloudBehaviors": false,
              "gamepad": false,
              "profiler": false
            },
            "output": {
              "format": "exe",
              "platform": "windows"
            },
            "scaling": {
              "mode": "full",
              "size": 480
            }
          }
          EOF
          turbowarp-packager-cli -i "${{ inputs.sb3_file }}" -o "${{ inputs.output_name }}.exe" -s config-exe.json

      # ==================== HTML 转 APK（Capacitor 构建） ====================
      - name: 设置 JDK 17（Android 必需）
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 初始化 Capacitor 并打包 APK
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init ${{ inputs.output_name }} ${{ inputs.apk_package_name }} --web-dir www
          mkdir -p www
          cp "${{ inputs.output_name }}.html" www/index.html
          npx cap add android
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../${{ inputs.output_name }}.apk

      # ==================== 发布到 Releases ====================
      - name: 发布生成的文件
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ inputs.output_name }}.exe
            ${{ inputs.output_name }}.html
            ${{ inputs.output_name }}.apk
          tag_name: build-${{ github.run_number }}
          name: 编译版本 ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}