name: Build Turbowarp Project

on:
  workflow_dispatch:
    inputs:
      sb_filename:
        description: 'Uploaded .sb3 filename (eg. project.sb3)'
        required: true
        default: 'project.sb3'
      output_filename:
        description: 'Output base filename (eg. my_game)'
        required: true
        default: 'my_game'
      apk_package_name:
        description: 'APK package name (eg. com.example.game)'
        required: true
        default: 'com.example.game'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Turbowarp Packager
        run: npm install @turbowarp/packager cross-fetch

      - name: Build HTML and Windows ZIP
        run: |
          cat << 'EOF' > build.js
          const fs = require('fs');
          const Packager = require('@turbowarp/packager');
          
          (async () => {
              try {
                  const sb_filename = '${{ github.event.inputs.sb_filename }}' || 'project.sb3';
                  const output_filename = '${{ github.event.inputs.output_filename }}' || 'my_game';
                  
                  console.log(`Loading project: ${sb_filename}`);
                  const projectData = fs.readFileSync(sb_filename);
                  
                  // Progress callback for large assets fetch
                  const progressCallback = (type, a, b) => {
                      if (type === 'large-asset-fetch') console.log(`Fetching asset: ${a}/${b}`);
                  };
                  const loadedProject = await Packager.loadProject(projectData, progressCallback);
                  
                  console.log("Building HTML...");
                  const packagerHtml = new Packager.Packager();
                  packagerHtml.project = loadedProject;
                  packagerHtml.options.env = 'html';
                  const resultHtml = await packagerHtml.package();
                  fs.writeFileSync(`${output_filename}.html`, resultHtml.data);
                  console.log(`Saved ${output_filename}.html`);

                  console.log("Building Windows (ZIP)...");
                  const packagerExe = new Packager.Packager();
                  packagerExe.project = loadedProject;
                  packagerExe.options.env = 'electron-win32';
                  packagerExe.addEventListener('large-asset-fetch', ({detail}) => {
                      console.log('Downloading Windows Packager large assets...', detail);
                  });
                  const resultExe = await packagerExe.package();
                  fs.writeFileSync(`${output_filename}-windows.zip`, resultExe.data);
                  console.log(`Saved ${output_filename}-windows.zip`);
                  
              } catch (e) {
                  console.error("Packager error:", e);
                  process.exit(1);
              }
          })();
          EOF
          node build.js

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor and Build APK
        run: |
          mkdir apk-build
          cd apk-build
          npm init -y
          npm install @capacitor/core
          npm install @capacitor/cli --save-dev
          npm install @capacitor/android
          
          mkdir www
          cp ../${{ github.event.inputs.output_filename }}.html www/index.html
          
          npx cap init "${{ github.event.inputs.output_filename }}" "${{ github.event.inputs.apk_package_name }}" --web-dir www
          npx cap add android
          npx cap sync android
          
          cd android
          # 升级 Gradle Wrapper 到 8.7，以修复旧版 Gradle 的 ASM 库无法解析 Java 21 字节码 (major version 65) 的 bug
          sed -i 's/gradle-.*-all\.zip/gradle-8.7-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          ./gradlew assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk ../../${{ github.event.inputs.output_filename }}.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ github.event.inputs.output_filename }}-windows.zip
            ${{ github.event.inputs.output_filename }}.apk
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
