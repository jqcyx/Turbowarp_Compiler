name: Build Turbowarp Project

on:
  workflow_dispatch:
    inputs:
      sb_filename:
        description: 'Uploaded .sb3 filename (eg. project.sb3)'
        required: true
        default: 'project.sb3'
      output_filename:
        description: 'Output base filename (eg. my_game)'
        required: true
        default: 'my_game'
      apk_package_name:
        description: 'APK package name (eg. com.example.game)'
        required: true
        default: 'com.example.game'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Turbowarp Packager
        run: npm install -g @turbowarp/packager

      - name: Build HTML
        run: |
          npx turbowarp-packager \
            --input "${{ github.workspace }}/${{ github.event.inputs.sb_filename }}" \
            --dest "${{ github.event.inputs.output_filename }}.html"
          
      - name: Build Windows EXE
        run: |
          npx turbowarp-packager \
            --input "${{ github.workspace }}/${{ github.event.inputs.sb_filename }}" \
            --target electron-win32 \
            --dest "${{ github.event.inputs.output_filename }}.exe"

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor and Build APK
        run: |
          mkdir apk-build
          cd apk-build
          npm init -y
          npm install @capacitor/core
          npm install @capacitor/cli --save-dev
          npm install @capacitor/android
          
          mkdir www
          cp ../${{ github.event.inputs.output_filename }}.html www/index.html
          
          npx cap init "${{ github.event.inputs.output_filename }}" "${{ github.event.inputs.apk_package_name }}" --web-dir www
          npx cap add android
          npx cap sync android
          
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../../${{ github.event.inputs.output_filename }}.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ github.event.inputs.output_filename }}.exe
            ${{ github.event.inputs.output_filename }}.apk
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
